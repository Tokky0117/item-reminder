<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>日用品リスト</title>
  <meta name="theme-color" id="themeColorMeta" content="#f5f5f5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="startup-screen" id="startupScreen">
    <div class="startup-card">
      <div class="startup-visual" id="startupVisual" aria-hidden="true"></div>
      <div class="startup-title" id="startupTitle">日用品リスト</div>
      <div class="startup-version" id="startupVersion">ver2.1.0</div>
      <div class="startup-message" id="startupMessage"></div>
      <button class="startup-start-button" id="startupStartButton" data-action="start-title">スタート</button>
    </div>
    <div class="startup-toast" id="startupToast">起動中…</div>
  </div>

  <div class="app" id="app">
    <div class="header">
      <div class="title-row">
        <button class="shopping-button" data-action="toggle-shopping" aria-label="買い物リスト">
          <span>買い物</span>
          <svg class="shopping-switch-icon" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M5 2.5L2.8 4.7L5 6.9"></path>
            <path d="M2.9 4.7H10.8C12.1 4.7 13.1 5.7 13.1 7"></path>
            <path d="M11 13.5L13.2 11.3L11 9.1"></path>
            <path d="M13.1 11.3H5.2C3.9 11.3 2.9 10.3 2.9 9"></path>
          </svg>
        </button>
        <button class="shopping-cancel-top-button" id="shoppingCancelTopButton" data-action="open-home-cancel" aria-label="買い物をキャンセル">キャンセル</button>

        <div class="title-center">
          <h1 id="appTitle">日用品リスト</h1>
        </div>

        <button class="add-top-button icon-top-button" data-action="open-add" aria-label="日用品を追加">
          <svg class="top-button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5V19"></path>
            <path d="M5 12H19"></path>
          </svg>
        </button>
        <button class="shopping-copy-button icon-top-button" id="shoppingCopyButton" data-action="copy-shopping" aria-label="購入リストをコピー">
          <svg class="top-button-icon copy-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5.5" y="8.5" width="10.5" height="10.5" rx="2"></rect>
            <path d="M9 5.5H17.5C18.6 5.5 19.5 6.4 19.5 7.5V16"></path>
          </svg>
          <svg class="top-button-icon copy-done-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5.5 12.6L10 17L18.8 7.4"></path>
          </svg>
        </button>
      </div>

      <div class="owner-tabs" id="ownerTabs" aria-label="使用者タブ"></div>
    </div>

    <div id="items"></div>

    <div class="footer">
      <div class="save-status" id="saveStatus" aria-live="polite"></div>
      <button class="purchase-complete-button" id="purchaseCompleteButton" data-action="open-purchase-confirm" aria-label="購入確定" disabled>購入確定</button>
    </div>
  </div>

  <div class="toast" id="toast" data-action="hide-toast"></div>

  <div class="modal-backdrop" id="itemModal">
    <div class="modal item-page-modal">
      <div class="item-page-header">
        <div class="item-page-title-row">
          <button class="item-page-cancel-button" data-action="close-item-modal">キャンセル</button>
          <div class="item-page-title-center">
            <div class="item-page-title" id="itemModalTitle">日用品を追加</div>
          </div>
          <div class="item-page-header-spacer" aria-hidden="true"></div>
        </div>
      </div>

      <div class="item-page-content">
        <div class="item-page-form">
          <div class="item-form-card">
            <div class="field">
              <label>日用品名</label>
              <input id="modalName" type="text" placeholder="入力してください" oninput="validateItemModal()">
            </div>

            <div class="field">
              <label>備考</label>
              <input id="modalNote" type="text" placeholder="任意">
            </div>

            <div class="field">
              <label>分類</label>
              <div class="picker" id="categoryPicker">
                <button class="picker-button" type="button" data-action="toggle-category-picker">
                  <span id="modalCategoryLabel">その他</span>
                  <span class="picker-arrow" aria-hidden="true"></span>
                </button>
                <div class="picker-menu" id="categoryPickerMenu"></div>
              </div>
            </div>

            <div class="field">
              <label>使用者</label>
              <div class="picker" id="ownerPicker">
                <button class="picker-button" type="button" data-action="toggle-owner-picker">
                  <span id="modalOwnerLabel">共同</span>
                  <span class="picker-arrow" aria-hidden="true"></span>
                </button>
                <div class="picker-menu" id="ownerPickerMenu"></div>
              </div>
            </div>
          </div>

          <div class="item-page-bottom-actions">
            <button class="item-page-save-bottom-button" id="modalConfirm" data-action="confirm-item-modal" disabled>決定</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="deleteConfirmModal">
    <div class="modal">
      <h2>削除確認</h2>
      <div class="confirm-message" id="deleteConfirmMessage">この日用品を削除しますか？</div>
      <div class="modal-actions delete-actions">
        <button class="cancel-button" data-action="close-delete-confirm">いいえ</button>
        <button class="confirm-button danger" data-action="confirm-delete-item">はい</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="purchaseConfirmModal">
    <div class="modal">
      <h2>購入確認</h2>
      <div class="confirm-message">購入を完了しますか？</div>
      <div class="modal-actions">
        <button class="cancel-button" data-action="close-purchase-confirm">いいえ</button>
        <button class="confirm-button shopping" data-action="confirm-purchase-complete">はい</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="homeCancelConfirmModal">
    <div class="modal">
      <h2>確認</h2>
      <div class="confirm-message" id="homeCancelConfirmMessage">購入をキャンセルしますか？</div>
      <div class="modal-actions">
        <button class="cancel-button" data-action="close-home-cancel-confirm">いいえ</button>
        <button class="confirm-button" data-action="confirm-home-cancel">はい</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="updateRetryModal">
    <div class="modal">
      <h2>更新失敗</h2>
      <div class="confirm-message" id="updateRetryMessage">サーバーへの更新に失敗しました。
画面上の変更はまだ保存されていません。</div>
      <div class="modal-actions retry-actions">
        <button class="cancel-button" data-action="cancel-pending-update">更新をキャンセル</button>
        <button class="confirm-button" data-action="retry-pending-update">再試行</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="conflictModal">
    <div class="modal">
      <h2 id="conflictTitle">更新確認</h2>
      <div class="confirm-message" id="conflictMessage">他の端末でリストが更新されています。<br>更新すると、他の端末の変更が上書きされる可能性があります。</div>
      <div class="modal-actions conflict-actions" id="conflictActions">
        <button class="cancel-button" data-action="load-latest-conflict">更新をキャンセル</button>
        <button class="confirm-button" data-action="force-pending-conflict">更新する</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="loadFailureModal">
    <div class="modal">
      <h2>読み込み失敗</h2>
      <div class="confirm-message" id="loadFailureMessage">リストを読み込めませんでした。</div>
      <div class="modal-actions load-failure-actions">
        <button class="cancel-button" data-action="return-title-load-failure">タイトルに戻る</button>
        <button class="confirm-button" data-action="retry-load-failure">再読み込み</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
